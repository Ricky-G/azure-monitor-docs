<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" aria-labelledby="title desc" role="img" viewBox="0 0 1600 900"><title id="title">Send mobile telemetry to Azure Monitor through a gateway</title><desc id="desc">Mobile apps send OTLP telemetry to a customer-managed gateway. Choose either an OpenTelemetry Collector or an APIM proxy. The gateway stores Azure Monitor credentials and forwards telemetry to Azure Monitor for ingestion and analysis.</desc><defs><marker id="arrowBlue" markerHeight="12" markerWidth="12" orient="auto-start-reverse" refX="10" refY="6" viewBox="0 0 12 12"><path fill="#2B7CD3" d="M 0 0 L 12 6 L 0 12 z"/></marker></defs><rect width="1600" height="900" x="0" y="0" fill="#FFF"/><text x="800" y="76" fill="#17253D" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">Send mobile telemetry to Azure Monitor through a gateway</text><text x="800" y="118" fill="#5B6573" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle">Apps send OTLP to a gateway you manage. The gateway forwards authenticated telemetry to Azure Monitor.</text><g id="mobile-apps-card"><rect width="320" height="390" x="60" y="250" fill="#FFF" stroke="#D7E3F2" stroke-width="2" rx="24" ry="24"/><rect width="320" height="8" x="60" y="250" fill="#0F6CBD" rx="8" ry="8"/><circle cx="220" cy="316" r="44" fill="#EAF4FF"/><rect width="34" height="52" x="203" y="291" fill="none" stroke="#0F6CBD" stroke-width="3" rx="7" ry="7"/><line x1="212" x2="228" y1="297" y2="297" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><line x1="214" x2="226" y1="336" y2="336" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><text x="220" y="398" fill="#17253D" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700" text-anchor="middle">Mobile apps</text><rect width="136" height="34" x="152" y="420" fill="#EFF4FA" rx="17" ry="17"/><text x="220" y="443" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Community OTel</text><circle cx="108" cy="482" r="4.2" fill="#0F6CBD"/><text x="124" y="488" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">Instrument with OTel</text><circle cx="108" cy="524" r="4.2" fill="#0F6CBD"/><text x="124" y="530" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">Send OTLP to your gateway</text><circle cx="108" cy="566" r="4.2" fill="#0F6CBD"/><text x="124" y="572" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">Keep auth out of the app</text></g><g id="gateway-group"><rect width="760" height="510" x="420" y="175" fill="#F8FBFF" stroke="#C8D9ED" stroke-width="2" rx="30" ry="30"/><rect width="258" height="40" x="456" y="201" fill="#EAF4FF" rx="20" ry="20"/><text x="585" y="227" fill="#0F6CBD" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Customer-managed gateway</text><rect width="122" height="40" x="1022" y="201" fill="#FFF" stroke="#C8D9ED" stroke-width="1" rx="20" ry="20"/><text x="1083" y="227" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Choose one</text><text x="460" y="271" fill="#5B6573" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">Deploy in your cloud or network and choose the gateway model that fits your app.</text><rect width="330" height="280" x="456" y="305" fill="#FFF" stroke="#D7E3F2" stroke-width="2" rx="24" ry="24"/><rect width="330" height="8" x="456" y="305" fill="#0F6CBD" rx="8" ry="8"/><rect width="96" height="28" x="662" y="322" fill="#EAF4FF" rx="14" ry="14"/><text x="710" y="340.5" fill="#0F6CBD" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">High volume</text><circle cx="496" cy="359" r="24" fill="#EAF4FF"/><line x1="483.4" x2="497.8" y1="350" y2="350" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><circle cx="479.8" cy="350" r="2.88" fill="#0F6CBD"/><line x1="483.4" x2="497.8" y1="359" y2="359" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><circle cx="479.8" cy="359" r="2.88" fill="#0F6CBD"/><line x1="483.4" x2="497.8" y1="368" y2="368" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><circle cx="479.8" cy="368" r="2.88" fill="#0F6CBD"/><line x1="497.8" x2="506.8" y1="350" y2="359" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><line x1="497.8" x2="506.8" y1="359" y2="359" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><line x1="497.8" x2="506.8" y1="368" y2="359" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><line x1="506.8" x2="515.8" y1="359" y2="359" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.7"/><circle cx="519.4" cy="359" r="3.24" fill="#0F6CBD"/><text x="536" y="368" fill="#17253D" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="start">OTel Collector</text><circle cx="496" cy="430" r="4.2" fill="#0F6CBD"/><text x="512" y="436" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">Batch, retry, queue</text><circle cx="496" cy="470" r="4.2" fill="#0F6CBD"/><text x="512" y="476" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">Sample, enrich, redact</text><circle cx="496" cy="510" r="4.2" fill="#0F6CBD"/><text x="512" y="516" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">Telemetry pipeline</text><rect width="330" height="280" x="814" y="305" fill="#FFF" stroke="#D7E3F2" stroke-width="2" rx="24" ry="24"/><rect width="330" height="8" x="814" y="305" fill="#7A57D1" rx="8" ry="8"/><rect width="104" height="28" x="1016" y="322" fill="#F3EDFF" rx="14" ry="14"/><text x="1068" y="340.5" fill="#6941C6" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Small volume</text><circle cx="854" cy="359" r="24" fill="#F3EDFF"/><circle cx="839.6" cy="359" r="3.6" fill="#7A57D1"/><circle cx="868.4" cy="348.2" r="3.6" fill="#7A57D1"/><circle cx="868.4" cy="369.8" r="3.6" fill="#7A57D1"/><line x1="843.2" x2="861.2" y1="359" y2="350" stroke="#7A57D1" stroke-linecap="round" stroke-width="2.7"/><line x1="843.2" x2="861.2" y1="359" y2="368" stroke="#7A57D1" stroke-linecap="round" stroke-width="2.7"/><text x="890" y="368" fill="#17253D" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="start">APIM proxy</text><circle cx="854" cy="430" r="4.2" fill="#7A57D1"/><text x="870" y="436" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">Simpler operations</text><circle cx="854" cy="470" r="4.2" fill="#7A57D1"/><text x="870" y="476" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">Routing, throttling, headers</text><circle cx="854" cy="510" r="4.2" fill="#7A57D1"/><text x="870" y="516" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start">Limited telemetry processing</text><circle cx="800" cy="445" r="30" fill="#F8FBFF"/><circle cx="800" cy="445" r="28" fill="#FFF" stroke="#C8D9ED" stroke-width="2.5"/><text x="800" y="454" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">OR</text><rect width="688" height="56" x="456" y="595" fill="#FFF" stroke="#DCE7F4" stroke-width="2" rx="18" ry="18"/><circle cx="486" cy="623" r="18" fill="#EAF4FF"/><rect width="16" height="14.4" x="478" y="615.4" fill="none" stroke="#0F6CBD" stroke-width="2.08" rx="3.2" ry="3.2"/><line x1="480.4" x2="480.4" y1="615.4" y2="610.6" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.08"/><line x1="491.6" x2="491.6" y1="615.4" y2="610.6" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.08"/><line x1="480.4" x2="491.6" y1="610.6" y2="610.6" stroke="#0F6CBD" stroke-linecap="round" stroke-width="2.08"/><circle cx="486" cy="621.8" r="1.6" fill="#0F6CBD"/><text x="516" y="631" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" text-anchor="start">The gateway stores Azure Monitor auth and forwards telemetry.</text></g><g id="azure-monitor-card"><rect width="320" height="390" x="1220" y="250" fill="#FFF" stroke="#D7E3F2" stroke-width="2" rx="24" ry="24"/><rect width="320" height="8" x="1220" y="250" fill="#0F6CBD" rx="8" ry="8"/><circle cx="1380" cy="316" r="44" fill="#EAF4FF"/><rect width="44" height="28" x="1358" y="298" fill="none" stroke="#0F6CBD" stroke-width="3" rx="5" ry="5"/><line x1="1380" x2="1380" y1="326" y2="336" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><line x1="1368" x2="1392" y1="339" y2="339" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><line x1="1366" x2="1376" y1="318" y2="312" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><line x1="1376" x2="1386" y1="312" y2="315" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><line x1="1386" x2="1394" y1="315" y2="308" stroke="#0F6CBD" stroke-linecap="round" stroke-width="3"/><text x="1380" y="398" fill="#17253D" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700" text-anchor="middle">Azure Monitor</text><rect width="152" height="34" x="1304" y="420" fill="#EFF4FA" rx="17" ry="17"/><text x="1380" y="443" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Ingest and analyze</text><circle cx="1268" cy="482" r="4.2" fill="#0F6CBD"/><text x="1284" y="488" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">Ingestion endpoint</text><circle cx="1268" cy="524" r="4.2" fill="#0F6CBD"/><text x="1284" y="530" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">App Insights and Logs</text><circle cx="1268" cy="566" r="4.2" fill="#0F6CBD"/><text x="1284" y="572" fill="#425466" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start">Workbooks and alerts</text><rect width="214" height="28" x="1273" y="592" fill="#EAF4FF" rx="14" ry="14"/><text x="1380" y="611" fill="#0F6CBD" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Microsoft support starts here</text></g><line x1="380" x2="420" y1="430" y2="430" stroke="#2B7CD3" stroke-linecap="round" stroke-width="5" marker-end="url(#arrowBlue)"/><rect width="88" height="30" x="356" y="362" fill="#FFF" stroke="#C8D9ED" stroke-width="1" rx="15" ry="15"/><text x="400" y="382" fill="#0F6CBD" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">OTLP</text><line x1="1180" x2="1220" y1="430" y2="430" stroke="#2B7CD3" stroke-linecap="round" stroke-width="5" marker-end="url(#arrowBlue)"/></svg>